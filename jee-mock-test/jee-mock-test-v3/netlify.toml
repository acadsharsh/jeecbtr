[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─── Redirect: ensure all auth routes work ───────────────────────────
[[redirects]]
  from = "/auth/*"
  to = "/auth/:splat"
  status = 200

# ─── Headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Function config ──────────────────────────────────────────────────
[functions]
  # pdf-parse needs more memory & time for large PDFs
  node_bundler = "nft"

[functions."api/extract-pdf"]
  timeout = 60

[functions."api/upload-diagram"]
  timeout = 30
